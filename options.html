<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>reading assistant — options</title>
<style>
* { box-sizing: border-box; }

body { 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
  margin: 0;
  padding: 40px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  color: #2d3748;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
}

h1 { 
  margin: 0 0 40px 0;
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
}

.section {
  margin-bottom: 32px;
  padding: 24px;
  background: #f7fafc;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
}

.section h2 {
  margin: 0 0 16px 0;
  font-size: 18px;
  font-weight: 600;
  color: #2d3748;
}

label { 
  display: block; 
  margin-bottom: 8px; 
  font-weight: 600;
  color: #4a5568;
  font-size: 14px;
}

input[type="text"], 
input[type="password"], 
select { 
  width: 100%; 
  padding: 12px 16px; 
  border: 2px solid #e2e8f0; 
  border-radius: 8px; 
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s ease;
  background: white;
}

input[type="text"]:focus, 
input[type="password"]:focus, 
select:focus { 
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.row { 
  display: flex; 
  align-items: center; 
  gap: 16px; 
  margin-top: 12px; 
}

.hint { 
  color: #718096; 
  font-size: 13px; 
  margin-top: 8px;
  line-height: 1.5;
}

.checkbox-container {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
}

input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #667eea;
}

.actions {
  display: flex;
  gap: 12px;
  margin-top: 32px;
  justify-content: center;
}

button { 
  padding: 12px 24px; 
  border-radius: 8px; 
  border: none;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s ease;
  font-family: inherit;
}

.btn-primary {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
}

.btn-secondary {
  background: #e2e8f0;
  color: #4a5568;
}

.btn-secondary:hover {
  background: #cbd5e0;
}

.status {
  text-align: center;
  margin-top: 16px;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
}

.status.success {
  background: #c6f6d5;
  color: #22543d;
  border: 1px solid #9ae6b4;
}

.status.error {
  background: #fed7d7;
  color: #742a2a;
  border: 1px solid #feb2b2;
}

.status.info {
  background: #bee3f8;
  color: #2a4365;
  border: 1px solid #90cdf4;
}
</style>
</head>
<body>
<div class="container">
  <h1>reading assistant</h1>

  <div class="section">
    <h2>ai provider</h2>
    <label>select provider</label>
    <select id="provider">
      <option value="openai">openai (your api key)</option>
      <option value="ollama">ollama (local)</option>
    </select>
    <div class="hint">choose how you want to process your reading questions</div>
  </div>

  <div class="section" id="openai-config">
    <h2>openai settings</h2>
    <label>api key</label>
    <input id="openaiKey" type="password" placeholder="sk-..." />
    <div class="hint">your openai api key (stored locally)</div>
    
    <label>model</label>
    <input id="model" type="text" value="gpt-4o-mini" />
    <div class="hint">the openai model to use for responses</div>
  </div>

  <div class="section" id="ollama-config" style="display:none;">
    <h2>ollama settings</h2>
    <label>endpoint</label>
    <input id="localEndpoint" type="text" value="http://localhost:11434" />
    <div class="hint">ensure ollama is running locally</div>
    
    <div class="checkbox-container">
      <input type="checkbox" id="localOnly" />
      <label for="localOnly">local-only mode</label>
    </div>
    <div class="hint">forces the extension to avoid network calls</div>
  </div>

  <div class="actions">
    <button id="save" class="btn-primary">save settings</button>
    <button id="test" class="btn-secondary">test connection</button>
  </div>
  
  <div id="status" class="status" style="display:none;"></div>
</div>

<script src="options.js"></script>
</body>
</html>
